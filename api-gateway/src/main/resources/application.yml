server:
 port: 8080
spring:
 application:
  name: api-gateway
 cloud:
  gateway:
   routes:
# RUTA PARA EL SERVICIO DEL CATALOGO
    - id: service-catalogo
      uri: http://localhost:8081
      predicates:
      - Path=/donuts/**
# RUTA PARA EL SERVICIO DE CLIENTES
    - id: servicio-clientes
      uri: http://localhost:8082
      predicates:
      - Path=/clientes/**
#RUTA PARA EL SERVICIO DE PEDIDO
    - id: servicio-pedido
      uri: http://localhost:8083
      predicates:
      - Path=/api/v1/pedidos/**
#RUTA PARA EL SERVICIO DE PAGO
    - id: service-pagos
      uri: http://localhost:8084
      predicates:
      - Path=/api/v1/pagos/**
#RUTA PARA EL SERVICIO DE LOGISTICA
    - id: service-logistica
      uri: http://localhost:8085
      predicates:
      - Path=/api/v1/despachos/**
