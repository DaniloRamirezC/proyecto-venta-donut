spring.application.name=service-reportes
server.port=8088
#Conexion a BD Reportes
spring.datasource.url=jdbc:mysql://localhost:3306/bd_reportes?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Ruta donde se generará el JSON de la documentación
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
springdoc.api-docs.path=/api/v1/reportes/v3/api-docs
# Título de la documentación
springdoc.swagger-ui.path=/api/v1/reportes/swagger-ui.html

# Habilitación CORS
spring.mvc.cors.allowed-origins=http://localhost:8080
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# Ordenar operaciones en la UI
springdoc.swagger-ui.operations-sorter=alpha
# Para indicar que las llamadas deben ir al Gateway
springdoc.server-url=http://localhost:8080
