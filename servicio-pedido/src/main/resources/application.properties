spring.application.name=servicio-pedido
server.port=8083
#Conexion a BD Clientes
spring.datasource.url=jdbc:mysql://localhost:3306/bd_pedidos?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Ruta donde se generará el JSON de la documentación
springdoc.api-docs.path=/api/v1/v3/api-docs
# Título de la documentación
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.server-url=http://localhost:8080

#--Configuración de CORS--
spring.mvc.cors.allowed-origins=http://localhost:8080
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
