spring.application.name=service-empresa
server.port=8087
#Conexion a BD Empresa
spring.datasource.url=jdbc:mysql://localhost:3306/bd_empresa?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Ruta donde se generará el JSON de la documentación
springdoc.api-docs.path=/api/v1/empresas/v3/api-docs
springdoc.swagger-ui.path=/api/v1/empresas/swagger-ui.html
spring.mvc.cors.allowed-origins=http://localhost:8080
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
#Ordenar operaciones en la UI
springdoc.swagger-ui.operations-sorter=alpha
springdoc.server-url=http://localhost:8080