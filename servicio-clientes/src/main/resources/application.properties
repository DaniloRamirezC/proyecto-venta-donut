spring.application.name=servicio-clientes
server.port=8082
#Conexion a BD Clientes
spring.datasource.url=jdbc:mysql://localhost:3306/bd_clientes?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Ruta donde se generará el JSON de la documentación
springdoc.api-docs.path=/api/v1/clientes/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.mvc.cors.allowed-origins=http://localhost:8080
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
# Ordenar operaciones en la UI
springdoc.swagger-ui.operations-sorter=alpha
# Para indicar que las llamadas deben ir al Gateway
springdoc.server-url=http://localhost:8080