spring.application.name=service-catalogo
server.port=8081
#Conexion a BD Catalogo
spring.datasource.url=jdbc:mysql://localhost:3306/bd_catalogo?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Ruta donde se generará el JSON de la documentación
springdoc.api-docs.path=/api/v1/donuts/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
