spring.application.name=service-catalogo
server.port=8081
#Conexion a BD Catalogo
spring.datasource.url=jdbc:mysql://localhost:3306/bd_catalogo?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Ruta donde se generará el JSON de la documentación
springdoc.api-docs.path=/api/v1/catalogo/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.mvc.cors.allowed-origins=http://localhost:8080
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
# Ordenar operaciones en la UI
springdoc.swagger-ui.operations-sorter=alpha
# Indica que las llamadas deben ir al API Gateway (8080)
springdoc.server-url=http://localhost:8080
